<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dankpad — Waitlist</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --acid:#C8FF00;
  --bg:#07070a;
  --s1:#0f0f14;
  --s2:#17171e;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --text:#f0eee8;
  --muted:#5e5d68;
  --success:#44ffb0;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);
  font-family:'Syne',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}

canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── LOADER ── */
#loader{
  position:fixed;inset:0;z-index:200;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;
  transition:opacity .7s ease,visibility .7s ease;
}
#loader.hide{opacity:0;visibility:hidden}
.ld-logo{display:flex;align-items:center;gap:12px}
.ld-name{font-size:22px;font-weight:800;letter-spacing:-.3px}
.ld-name span{color:var(--acid)}
.ld-bars{display:flex;gap:4px;align-items:flex-end;height:28px}
.ld-bar{width:3px;border-radius:2px;background:rgba(200,255,0,.1)}
.ld-txt{font-family:'JetBrains Mono',monospace;font-size:10px;
  letter-spacing:.18em;color:rgba(200,255,0,.4);text-transform:uppercase}

/* ── NAV ── */
nav{
  position:relative;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 32px;
}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-name{font-size:17px;font-weight:800;letter-spacing:-.3px;color:var(--text)}
.nav-name span{color:var(--acid)}
.nav-pill{
  display:flex;align-items:center;gap:7px;
  background:var(--s1);border:1px solid var(--border2);
  border-radius:20px;padding:5px 14px 5px 9px;
  font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);
}
.blink{width:6px;height:6px;border-radius:50%;background:var(--acid);
  animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* ── CENTER STAGE ── */
.stage{
  position:relative;z-index:1;
  min-height:calc(100vh - 64px - 56px);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 20px 100px;
  text-align:center;
}

/* heading */
.heading{
  font-family:'DM Serif Display',Georgia,serif;
  font-size:clamp(38px,7vw,68px);
  line-height:1.05;letter-spacing:-2px;
  margin-bottom:14px;
}
.heading em{font-style:italic;color:var(--acid)}
.sub{font-family:'JetBrains Mono',monospace;font-size:12px;
  color:var(--muted);letter-spacing:.08em;margin-bottom:52px}

/* ── CARD ── */
.card{
  width:100%;max-width:400px;
  background:var(--s1);
  border:1px solid var(--border2);
  border-radius:14px;overflow:hidden;
}
.card-top{
  padding:28px 28px 0;
  text-align:left;
}
.step-dots{display:flex;gap:6px;margin-bottom:22px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border2);transition:all .35s}
.dot.done{background:var(--acid)}
.dot.active{background:var(--acid);box-shadow:0 0 0 3px rgba(200,255,0,.15);width:20px;border-radius:3px}

.card-tag{font-family:'JetBrains Mono',monospace;font-size:10px;
  color:var(--acid);letter-spacing:.1em;text-transform:uppercase;opacity:.8;margin-bottom:8px}
.card-title{font-family:'DM Serif Display',Georgia,serif;
  font-size:20px;line-height:1.2;letter-spacing:-.3px;margin-bottom:4px}
.card-title em{font-style:italic;color:var(--acid)}
.card-desc{font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--muted);line-height:1.6;margin-bottom:0}

.divider{height:1px;background:var(--border);margin:20px 0 0}
.card-body{padding:20px 28px 28px}

/* connect rows */
.con-btn{
  width:100%;display:flex;align-items:center;gap:12px;
  background:var(--s2);border:1.5px solid var(--border);
  border-radius:8px;padding:12px 14px;cursor:pointer;
  transition:border-color .2s;text-align:left;color:var(--text);margin-bottom:9px;
}
.con-btn:hover{border-color:var(--border2)}
.con-btn.ok{border-color:rgba(68,255,176,.28)}
.con-icon{width:32px;height:32px;border-radius:7px;background:var(--s1);
  border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0}
.con-label{font-size:13px;font-weight:700;flex:1}
.con-status{font-family:'JetBrains Mono',monospace;font-size:10px;
  padding:3px 8px;border-radius:4px;background:var(--s1);border:1px solid var(--border);color:var(--muted)}
.con-status.ok{background:rgba(68,255,176,.08);border-color:rgba(68,255,176,.2);color:var(--success)}

.addr{display:flex;align-items:center;gap:8px;
  background:rgba(68,255,176,.04);border:1px solid rgba(68,255,176,.14);
  border-radius:7px;padding:8px 12px;margin-bottom:9px}
.addr-txt{font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--success);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* tasks */
.task{display:flex;align-items:center;gap:11px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:8px;padding:11px 13px;cursor:pointer;
  transition:border-color .2s;margin-bottom:8px;user-select:none}
.task:hover{border-color:var(--border2)}
.task.done{border-color:rgba(68,255,176,.2)}
.task.locked{opacity:.3;pointer-events:none}
.task-chk{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);
  background:var(--s1);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:9px;color:transparent;transition:all .25s;font-weight:700}
.task.done .task-chk{background:var(--success);border-color:var(--success);color:#07070a}
.task-name{font-size:13px;font-weight:700;flex:1;text-align:left}
.task.done .task-name{text-decoration:line-through;color:var(--muted)}
.task-pts{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--acid);
  background:rgba(200,255,0,.08);border:1px solid rgba(200,255,0,.15);
  border-radius:3px;padding:2px 6px;white-space:nowrap}
.task.done .task-pts{color:var(--muted);background:var(--s1);border-color:var(--border)}

/* progress */
.prog-row{display:flex;justify-content:space-between;
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:6px}
.prog-track{height:1.5px;background:var(--border2);border-radius:2px;overflow:hidden;margin-bottom:18px}
.prog-fill{height:100%;background:var(--acid);border-radius:2px;transition:width .5s ease}

/* nft row */
.nft-row{display:flex;align-items:center;gap:14px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:8px;padding:14px;margin-bottom:10px;text-align:left}
.nft-name{font-size:14px;font-weight:800;margin-bottom:3px}
.nft-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
.base-chip{background:#1a52f5;border-radius:3px;padding:1px 5px;
  font-size:8px;color:#fff;margin-right:4px}
.price-line{display:flex;align-items:center;justify-content:space-between;
  background:var(--s2);border:1px solid var(--border);border-radius:8px;
  padding:12px 14px;margin-bottom:10px}
.price-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.price-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--acid)}
.eligible{display:flex;align-items:center;gap:7px;
  background:rgba(68,255,176,.05);border:1px solid rgba(68,255,176,.14);
  border-radius:7px;padding:9px 12px;margin-bottom:14px;
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--success)}

/* buttons */
.btn{width:100%;padding:14px;border:none;border-radius:8px;
  font-family:'Syne',system-ui,sans-serif;font-size:14px;font-weight:800;
  cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-p{background:var(--acid);color:#07070a}
.btn-p:hover{background:#d8ff1a;transform:translateY(-1px);box-shadow:0 6px 24px rgba(200,255,0,.2)}
.btn-p:disabled{background:var(--s2);color:var(--muted);cursor:not-allowed;transform:none;box-shadow:none}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--border2);margin-top:7px}
.btn-g:hover{color:var(--text);background:var(--s2)}

/* success */
.suc-body{padding:32px 28px;text-align:center}
.suc-icon{width:56px;height:56px;border-radius:50%;background:rgba(68,255,176,.08);
  border:1px solid rgba(68,255,176,.22);display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;font-size:22px;animation:pop .5s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.suc-title{font-family:'DM Serif Display',Georgia,serif;font-size:24px;letter-spacing:-.4px;margin-bottom:8px}
.suc-title em{color:var(--acid);font-style:italic}
.suc-desc{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);
  line-height:1.7;margin-bottom:20px}
.suc-pass{display:flex;align-items:center;gap:12px;
  background:var(--s2);border:1px solid var(--border2);border-radius:8px;
  padding:12px;margin-bottom:14px;text-align:left}
.suc-label{font-size:13px;font-weight:800;margin-bottom:2px}
.suc-addr{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
.share-row{display:flex;gap:8px}
.share-btn{flex:1;padding:11px;background:var(--s2);border:1px solid var(--border2);
  border-radius:8px;color:var(--text);font-family:'Syne',system-ui,sans-serif;
  font-size:12px;font-weight:700;cursor:pointer;transition:all .18s;
  display:flex;align-items:center;justify-content:center;gap:5px}
.share-btn:hover{border-color:var(--border2);background:var(--s1)}

/* ── COUNTDOWN FOOTER ── */
footer{
  position:fixed;bottom:0;left:0;right:0;z-index:10;
  border-top:1px solid var(--border);
  background:rgba(7,7,10,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  display:flex;align-items:center;justify-content:center;gap:28px;padding:12px 20px;
}
.cd-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;
  color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.cd-time{display:flex;align-items:center;gap:4px;
  font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--text)}
.cd-sep{color:var(--muted)}
.cd-sup{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
.cd-sup span{color:var(--acid)}

/* ── TOAST ── */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--s1);border:1px solid var(--border2);border-radius:8px;
  padding:10px 18px;font-family:'JetBrains Mono',monospace;font-size:12px;
  color:var(--text);white-space:nowrap;opacity:0;transition:all .3s;z-index:999}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

.cp{position:fixed;border-radius:1px;animation:fall linear forwards;pointer-events:none;z-index:9999}
@keyframes fall{from{opacity:1;transform:translateY(-10px) rotate(0)}to{opacity:0;transform:translateY(100vh) rotate(720deg)}}

@media(max-width:480px){
  nav{padding:16px 20px}
  .heading{font-size:36px}
  footer{gap:16px}
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<!-- LOADER -->
<div id="loader">
  <div class="ld-logo">
    <svg width="36" height="36" viewBox="0 0 100 100" fill="none">
      <rect width="100" height="100" rx="20" fill="#0f0f14"/>
      <polygon points="50,14 84,33 84,67 50,86 16,67 16,33" fill="none" stroke="rgba(200,255,0,.3)" stroke-width="1.5"/>
      <polygon points="50,28 70,39 70,61 50,72 30,61 30,39" fill="rgba(200,255,0,.08)" stroke="rgba(200,255,0,.75)" stroke-width="1.8"/>
      <line x1="50" y1="14" x2="30" y2="39" stroke="rgba(200,255,0,.2)" stroke-width="1"/>
      <line x1="50" y1="14" x2="70" y2="39" stroke="rgba(200,255,0,.2)" stroke-width="1"/>
      <line x1="84" y1="67" x2="70" y2="61" stroke="rgba(200,255,0,.2)" stroke-width="1"/>
      <line x1="16" y1="67" x2="30" y2="61" stroke="rgba(200,255,0,.2)" stroke-width="1"/>
      <polygon points="50,28 70,39 50,50 30,39" fill="rgba(200,255,0,.07)"/>
      <circle cx="50" cy="50" r="5.5" fill="#C8FF00"/>
      <circle cx="50" cy="50" r="2.5" fill="#fff" opacity=".85"/>
    </svg>
    <div class="ld-name"><span>D</span>ankpad</div>
  </div>
  <div class="ld-bars" id="ldBars"></div>
  <div class="ld-txt" id="ldTxt">Initializing</div>
</div>

<!-- NAV -->
<nav>
  <a href="#" class="nav-logo">
    <svg width="28" height="28" viewBox="0 0 100 100" fill="none">
      <rect width="100" height="100" rx="20" fill="#0f0f14"/>
      <polygon points="50,14 84,33 84,67 50,86 16,67 16,33" fill="none" stroke="rgba(200,255,0,.3)" stroke-width="1.5"/>
      <polygon points="50,28 70,39 70,61 50,72 30,61 30,39" fill="rgba(200,255,0,.08)" stroke="rgba(200,255,0,.75)" stroke-width="1.8"/>
      <circle cx="50" cy="50" r="5" fill="#C8FF00"/>
      <circle cx="50" cy="50" r="2" fill="#fff" opacity=".85"/>
    </svg>
    <span class="nav-name"><span>D</span>ankpad</span>
  </a>
  <div class="nav-pill"><div class="blink"></div>Waitlist open</div>
</nav>

<!-- CENTER STAGE -->
<div class="stage">
  <h1 class="heading">Mint your pass.<br><em>Earn everything.</em></h1>
  <p class="sub">Airdrop launchpad on Base &nbsp;·&nbsp; $0.30 mint &nbsp;·&nbsp; <span id="statMinted" style="color:var(--acid)">1,247</span> minted</p>

  <!-- Flow card -->
  <div class="card">
    <div class="card-top">
      <div class="step-dots" id="stepDots"></div>
      <div id="cardTag" class="card-tag"></div>
      <div id="cardTitle" class="card-title"></div>
      <div id="cardDesc" class="card-desc"></div>
    </div>
    <div class="divider"></div>
    <div class="card-body" id="cardBody"></div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <span class="cd-lbl">Launch in</span>
  <div class="cd-time">
    <span id="cdD">45</span><span class="cd-sep">d</span>
    <span id="cdH">00</span><span class="cd-sep">h</span>
    <span id="cdM">00</span><span class="cd-sep">m</span>
    <span id="cdS">00</span><span class="cd-sep">s</span>
  </div>
  <span class="cd-sup">Supply <span id="supNum">1,247</span>/3,600</span>
</footer>

<div class="toast" id="toast"></div>

<script>
/* ── CANVAS ── */
(function(){
  const c=document.getElementById('bg'),x=c.getContext('2d');
  let W,H;
  const resize=()=>{W=c.width=innerWidth;H=c.height=innerHeight};
  resize();addEventListener('resize',resize);
  const r=(a,b)=>a+Math.random()*(b-a);
  const pts=[]; for(let i=0;i<90;i++) pts.push(mkP());
  function mkP(){return{x:r(0,W),y:r(0,H),vx:r(-.1,.1),vy:r(-.25,-.04),sz:r(.5,1.8),l:0,ml:r(160,380),ma:r(.1,.45)}}
  const streaks=[]; for(let i=0;i<10;i++) streaks.push(mkS());
  function mkS(){return{x:r(-100,W),y:r(-60,H),len:r(50,120),spd:r(1.2,3),a:r(.05,.18),w:r(.5,1.2)}}
  const rings=[]; for(let i=0;i<5;i++) rings.push({r:r(60,400),spd:r(.3,.7),a:r(.04,.12),max:r(300,600)});
  function mkR(){return{r:50,spd:r(.25,.8),a:r(.04,.13),max:r(280,580)}}
  let gd=[];
  function bGrid(){gd=[];for(let gx=36;gx<W;gx+=36)for(let gy=36;gy<H;gy+=36)gd.push({x:gx,y:gy,ph:r(0,Math.PI*2),sp:r(.006,.018)})}
  bGrid(); addEventListener('resize',bGrid);
  function hex(cx,cy,rad){x.beginPath();for(let i=0;i<6;i++){const a=i/6*Math.PI*2-Math.PI/6;i?x.lineTo(cx+Math.cos(a)*rad,cy+Math.sin(a)*rad):x.moveTo(cx+Math.cos(a)*rad,cy+Math.sin(a)*rad)}x.closePath()}
  function frame(){
    x.clearRect(0,0,W,H);
    gd.forEach(d=>{d.ph+=d.sp;x.beginPath();x.arc(d.x,d.y,.7,0,Math.PI*2);x.fillStyle=`rgba(200,255,0,${.02+Math.abs(Math.sin(d.ph))*.07})`;x.fill()});
    const ang=-Math.PI/4;
    streaks.forEach(s=>{s.x+=Math.cos(ang)*s.spd;s.y+=Math.sin(ang)*s.spd;if(s.y>H+60)Object.assign(s,mkS());const ex=s.x+Math.cos(ang)*s.len,ey=s.y+Math.sin(ang)*s.len;const g=x.createLinearGradient(s.x,s.y,ex,ey);g.addColorStop(0,'rgba(200,255,0,0)');g.addColorStop(.45,`rgba(200,255,0,${s.a})`);g.addColorStop(1,'rgba(200,255,0,0)');x.beginPath();x.moveTo(s.x,s.y);x.lineTo(ex,ey);x.strokeStyle=g;x.lineWidth=s.w;x.stroke()});
    const cx=W/2,cy=H*.42;
    rings.forEach(rg=>{rg.r+=rg.spd;rg.a*=.994;if(rg.r>rg.max||rg.a<.004)Object.assign(rg,mkR());hex(cx,cy,rg.r);x.strokeStyle=`rgba(200,255,0,${rg.a})`;x.lineWidth=.8;x.stroke()});
    pts.forEach((p,i)=>{p.l++;p.x+=p.vx;p.y+=p.vy;const pc=p.l/p.ml;const a=pc<.1?pc*10*p.ma:pc>.8?(1-pc)*5*p.ma:p.ma;if(p.l>=p.ml)Object.assign(pts[i],mkP());x.beginPath();x.arc(p.x,p.y,p.sz,0,Math.PI*2);x.fillStyle=`rgba(200,255,0,${a})`;x.fill()});
    const cg=x.createRadialGradient(cx,cy,0,cx,cy,260);cg.addColorStop(0,'rgba(200,255,0,.03)');cg.addColorStop(1,'rgba(200,255,0,0)');x.fillStyle=cg;x.fillRect(0,0,W,H);
    const vg=x.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.75);vg.addColorStop(0,'rgba(7,7,10,0)');vg.addColorStop(1,'rgba(7,7,10,.92)');x.fillStyle=vg;x.fillRect(0,0,W,H);
    requestAnimationFrame(frame);
  }
  frame();
})();

/* ── LOADER ── */
(function(){
  const wrap=document.getElementById('ldBars'),st=document.getElementById('ldTxt');
  const N=16,bars=[];
  for(let i=0;i<N;i++){const b=document.createElement('div');b.className='ld-bar';b.style.cssText='height:4px;transition:height .12s ease,background .12s ease';wrap.appendChild(b);bars.push(b)}
  const msgs=['Initializing','Connecting to Base','Loading contracts','Almost ready'];
  let f=0,mi=0;
  const iv=setInterval(()=>{
    f++;
    bars.forEach((b,i)=>{const w=Math.sin(f*.18-i*.4);b.style.height=Math.max(3,4+w*13)+'px';b.style.background=`rgba(200,255,0,${Math.max(.07,(w+1)/2*.8)})`});
    if(f%20===0&&mi<msgs.length-1){mi++;st.textContent=msgs[mi]}
  },40);
  setTimeout(()=>{clearInterval(iv);document.getElementById('loader').classList.add('hide')},2600);
})();

/* ── STATE ── */
const S={step:1,wallet:false,addr:'',x:false,xh:'',t:{follow:false,retweet:false,telegram:false}};
const TK=['follow','retweet','telegram'];
const TL={follow:'https://x.com/dankpad',retweet:'https://x.com/dankpad',telegram:'https://t.me/dankpad'};

function gem(sz=44){return`<svg width="${sz}" height="${sz}" viewBox="0 0 100 100" fill="none"><rect width="100" height="100" rx="20" fill="#0f0f14"/><polygon points="50,14 84,33 84,67 50,86 16,67 16,33" fill="none" stroke="rgba(200,255,0,.3)" stroke-width="1.5"/><polygon points="50,28 70,39 70,61 50,72 30,61 30,39" fill="rgba(200,255,0,.08)" stroke="rgba(200,255,0,.75)" stroke-width="1.8"/><line x1="50" y1="14" x2="30" y2="39" stroke="rgba(200,255,0,.2)" stroke-width="1"/><line x1="50" y1="14" x2="70" y2="39" stroke="rgba(200,255,0,.2)" stroke-width="1"/><line x1="84" y1="67" x2="70" y2="61" stroke="rgba(200,255,0,.2)" stroke-width="1"/><line x1="16" y1="67" x2="30" y2="61" stroke="rgba(200,255,0,.2)" stroke-width="1"/><polygon points="50,28 70,39 50,50 30,39" fill="rgba(200,255,0,.07)"/><circle cx="50" cy="50" r="5.5" fill="#C8FF00"/><circle cx="50" cy="50" r="2.5" fill="#fff" opacity=".85"/></svg>`}
function trunc(a){return a?a.slice(0,6)+'...'+a.slice(-4):a}

const SCREENS={
  1:{
    tag:'01 — Connect',
    title:'Link your <em>accounts</em>',
    desc:'Wallet + X required to join.',
    body(){return`
      <button class="con-btn${S.wallet?' ok':''}" onclick="doWallet()">
        <div class="con-icon">🦊</div>
        <div class="con-label">${S.wallet?trunc(S.addr):'Base wallet'}</div>
        <div class="con-status${S.wallet?' ok':''}">${S.wallet?'✓':'connect'}</div>
      </button>
      ${S.wallet?`<div class="addr"><span class="addr-txt">${S.addr}</span><span style="color:var(--success);font-size:12px">✓</span></div>`:''}
      <button class="con-btn${S.x?' ok':''}" onclick="doX()">
        <div class="con-icon" style="font-size:14px;font-weight:700">𝕏</div>
        <div class="con-label">${S.x?'@'+S.xh:'X account'}</div>
        <div class="con-status${S.x?' ok':''}">${S.x?'✓':'connect'}</div>
      </button>
      <button class="btn btn-p" style="margin-top:16px" onclick="go(2)" ${!S.wallet||!S.x?'disabled':''}>Continue →</button>
    `}
  },
  2:{
    tag:'02 — Tasks',
    title:'Complete <em>the tasks</em>',
    desc:'All 3 unlock your mint.',
    body(){
      const done=TK.filter(k=>S.t[k]).length;
      const tasks=[
        {k:'follow',n:'Follow @dankpad',pts:'+500'},
        {k:'retweet',n:'Repost the launch',pts:'+750'},
        {k:'telegram',n:'Join our Telegram',pts:'+250'},
      ];
      return tasks.map((t,i)=>{
        const isDone=S.t[t.k];
        const locked=i>0&&!S.t[TK[i-1]];
        return`<div class="task${isDone?' done':''}${locked?' locked':''}" onclick="doTask('${t.k}')">
          <div class="task-chk">${isDone?'✓':''}</div>
          <div class="task-name">${t.n}</div>
          <div class="task-pts">${isDone?'done':t.pts}</div>
        </div>`;
      }).join('')+`
      <div class="prog-row"><span>${done}/3 done</span><span>${Math.round(done/3*100)}%</span></div>
      <div class="prog-track"><div class="prog-fill" style="width:${done/3*100}%"></div></div>
      <button class="btn btn-p" onclick="go(3)" ${done<3?'disabled':''}>${done<3?'Complete all tasks':'Proceed to mint →'}</button>
      <button class="btn btn-g" onclick="go(1)">← Back</button>`;
    }
  },
  3:{
    tag:'03 — Mint',
    title:'Mint your <em>pass</em>',
    desc:'$0.30 on Base. Yours forever.',
    body(){return`
      <div class="nft-row">
        ${gem(50)}
        <div>
          <div class="nft-name">Dankpad Pass</div>
          <div class="nft-meta"><span class="base-chip">Base</span>ERC-721 · No royalties</div>
        </div>
      </div>
      <div class="price-line">
        <div><div class="price-lbl">Price</div><div class="price-val">$0.30</div></div>
        <div style="text-align:right"><div class="price-lbl">Network</div><div style="font-family:'JetBrains Mono',monospace;font-size:12px;margin-top:4px">Base</div></div>
      </div>
      <div class="eligible">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="#44ffb0" stroke-width="1.2"/><path d="M4 7l2 2 4-4" stroke="#44ffb0" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Wallet verified · Tasks complete · Eligible
      </div>
      <button class="btn btn-p" onclick="doMint()">Mint Dankpad Pass</button>
      <button class="btn btn-g" onclick="go(2)">← Back</button>
    `}
  },
  4:{
    tag:'',title:'',desc:'',
    body(){return`
      <div class="suc-body">
        <div class="suc-icon">✦</div>
        <div class="suc-title">You're in. <em>Welcome.</em></div>
        <div class="suc-desc">Pass minted on Base.<br>Tasks drop week 5. Points are stacking.</div>
        <div class="suc-pass">${gem(40)}<div><div class="suc-label">Dankpad Pass #1248</div><div class="suc-addr">${trunc(S.addr)}</div></div></div>
        <div class="share-row">
          <button class="share-btn" onclick="shareX()">𝕏 Share</button>
          <button class="share-btn" onclick="toast('Coming soon!')">Basescan ↗</button>
        </div>
      </div>
    `}
  }
};

function renderDots(){
  document.getElementById('stepDots').innerHTML=[1,2,3].map(n=>{
    const cls=n<S.step?'done':n===S.step?'active':'';
    return`<div class="dot ${cls}"></div>`;
  }).join('');
}

function render(){
  const sc=SCREENS[S.step];
  renderDots();
  document.getElementById('cardTag').textContent=sc.tag;
  document.getElementById('cardTitle').innerHTML=sc.title;
  document.getElementById('cardDesc').textContent=sc.desc;
  document.getElementById('cardBody').innerHTML=sc.body();
}

function go(n){S.step=n;render()}

function doWallet(){
  if(S.wallet)return;
  toast('Connecting...');
  setTimeout(()=>{S.wallet=true;S.addr='0x'+[...Array(40)].map(()=>'0123456789abcdef'[Math.floor(Math.random()*16)]).join('');render();toast('Wallet connected!')},1100);
}
function doX(){
  if(S.x)return;
  toast('Redirecting to X...');
  setTimeout(()=>{S.x=true;S.xh='degen_holder';render();toast('@degen_holder connected!')},1200);
}
function doTask(k){
  if(S.t[k])return;
  const i=TK.indexOf(k);
  if(i>0&&!S.t[TK[i-1]])return;
  window.open(TL[k]||'#','_blank');
  toast('Verifying...');
  setTimeout(()=>{S.t[k]=true;render();toast('Task verified!')},1500);
}
function doMint(){
  const b=document.querySelector('.btn-p');
  if(b){b.textContent='Minting...';b.disabled=true}
  toast('Sending on Base...');
  setTimeout(()=>{S.step=4;render();confetti();bump()},1800);
}
function shareX(){
  window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent('Just minted my @dankpad Pass on Base 🔥\n\ndankpad.xyz #Dankpad #Base'),'_blank');
}

/* ── TOAST ── */
let tt;
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('on');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('on'),2800)}

/* ── CONFETTI ── */
function confetti(){
  const cols=['#C8FF00','#44ffb0','#fff','#ffd44e'];
  for(let i=0;i<65;i++){
    const p=document.createElement('div');p.className='cp';
    p.style.cssText=`left:${Math.random()*100}vw;top:-10px;width:${Math.random()*6+3}px;height:${Math.random()*6+3}px;background:${cols[~~(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${Math.random()*2+1.4}s;animation-delay:${Math.random()*.8}s`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),4000);
  }
}

/* ── COUNTDOWN ── */
const END=Date.now()+45*24*60*60*1e3;
function tick(){
  const d=Math.max(0,END-Date.now());
  document.getElementById('cdD').textContent=String(Math.floor(d/86400000)).padStart(2,'0');
  document.getElementById('cdH').textContent=String(Math.floor(d%86400000/3600000)).padStart(2,'0');
  document.getElementById('cdM').textContent=String(Math.floor(d%3600000/60000)).padStart(2,'0');
  document.getElementById('cdS').textContent=String(Math.floor(d%60000/1000)).padStart(2,'0');
}
tick();setInterval(tick,1000);

/* ── SUPPLY ── */
let supply=1247;
function bump(){supply++;['supNum','statMinted'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=supply.toLocaleString()})}
setInterval(()=>{if(Math.random()>.65)bump()},5000);

render();
</script>
</body>
</html>
